<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CODY: Captain of the Discovery</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #050a1a;
    --navy2: #0a1530;
    --navy3: #0d1f3c;
    --gold: #ffd700;
    --gold2: #ffb800;
    --blue: #00bfff;
    --blue2: #0090cc;
    --text: #e8f4ff;
    --dim: #8aafcc;
    --panel-border: 3px solid var(--gold);
    --shadow: 0 0 32px rgba(0,191,255,0.3), 0 4px 20px rgba(0,0,0,0.7);
  }

  html, body {
    height: 100%;
    background: var(--navy);
    color: var(--text);
    font-family: 'Georgia', 'Times New Roman', serif;
    overflow: hidden;
  }

  /* Stars background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.8) 0%, transparent 100%),
      radial-gradient(1px 1px at 25% 60%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 40% 30%, rgba(255,255,255,0.9) 0%, transparent 100%),
      radial-gradient(1px 1px at 55% 80%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 70% 20%, rgba(255,255,255,0.7) 0%, transparent 100%),
      radial-gradient(1px 1px at 85% 50%, rgba(255,255,255,0.8) 0%, transparent 100%),
      radial-gradient(1px 1px at 92% 75%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 5% 90%, rgba(255,255,255,0.7) 0%, transparent 100%),
      radial-gradient(1px 1px at 60% 45%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 33% 10%, rgba(255,255,255,0.9) 0%, transparent 100%),
      radial-gradient(1px 1px at 78% 88%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 15% 40%, rgba(255,255,255,0.8) 0%, transparent 100%),
      radial-gradient(2px 2px at 48% 68%, rgba(255,215,0,0.6) 0%, transparent 100%),
      radial-gradient(2px 2px at 20% 75%, rgba(0,191,255,0.5) 0%, transparent 100%),
      radial-gradient(2px 2px at 88% 12%, rgba(255,215,0,0.4) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  /* Progress bar */
  #progress-bar-container {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 6px;
    background: rgba(255,255,255,0.1);
    z-index: 100;
  }
  #progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--blue), var(--gold));
    transition: width 0.4s ease;
    box-shadow: 0 0 8px var(--blue);
  }

  /* Chapter label */
  #chapter-label {
    position: fixed;
    top: 10px; left: 50%;
    transform: translateX(-50%);
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--dim);
    z-index: 100;
    white-space: nowrap;
  }

  /* Main scene */
  #scene {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1;
    padding: 50px 16px 80px;
  }

  /* Panel */
  .panel {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    max-width: 680px;
    animation: panelIn 0.5s ease forwards;
    gap: 20px;
  }
  .panel.active { display: flex; }

  @keyframes panelIn {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Title panel */
  .panel-title {
    text-align: center;
  }
  .panel-title .ship-name {
    font-size: 0.75rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--blue);
    margin-bottom: 8px;
  }
  .panel-title h1 {
    font-size: clamp(1.8rem, 6vw, 3rem);
    color: var(--gold);
    text-shadow: 0 0 20px rgba(255,215,0,0.5), 0 0 40px rgba(255,215,0,0.2);
    line-height: 1.2;
    margin-bottom: 6px;
  }
  .panel-title .subtitle {
    font-size: 0.8rem;
    color: var(--dim);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  /* Photo */
  .comic-photo {
    width: 100%;
    max-width: 520px;
    max-height: 55vh;
    object-fit: cover;
    border-radius: 16px;
    border: 3px solid var(--gold);
    box-shadow: var(--shadow), 0 0 0 1px rgba(255,215,0,0.2);
    display: block;
  }

  /* Caption box */
  .caption {
    background: rgba(5,10,26,0.92);
    border: 1px solid rgba(255,215,0,0.3);
    border-radius: 12px;
    padding: 16px 22px;
    font-size: clamp(0.95rem, 2.5vw, 1.15rem);
    line-height: 1.6;
    text-align: center;
    color: var(--text);
    max-width: 520px;
    width: 100%;
    box-shadow: 0 4px 16px rgba(0,0,0,0.5);
    font-style: italic;
  }
  .caption strong {
    font-style: normal;
    color: var(--gold);
  }

  /* Text-only panel */
  .panel-text-only {
    text-align: center;
    max-width: 520px;
  }
  .panel-text-only .chapter-tag {
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--blue);
    margin-bottom: 12px;
  }
  .panel-text-only .panel-prose {
    font-size: clamp(1.1rem, 3vw, 1.4rem);
    line-height: 1.7;
    color: var(--text);
    font-style: italic;
  }

  /* BUTTONS */
  #nav-prev, #nav-next {
    position: fixed;
    bottom: 20px;
    z-index: 100;
    padding: 12px 24px;
    border-radius: 30px;
    border: 2px solid var(--gold);
    background: rgba(5,10,26,0.9);
    color: var(--gold);
    font-size: 0.85rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
    backdrop-filter: blur(8px);
  }
  #nav-prev { left: 16px; }
  #nav-next { right: 16px; }
  #nav-prev:hover, #nav-next:hover {
    background: var(--gold);
    color: var(--navy);
    box-shadow: 0 0 16px rgba(255,215,0,0.5);
  }
  #nav-prev:disabled, #nav-next:disabled {
    opacity: 0.3;
    cursor: default;
  }
  #nav-prev:disabled:hover, #nav-next:disabled:hover {
    background: rgba(5,10,26,0.9);
    color: var(--gold);
    box-shadow: none;
  }

  /* ============================================
     MINI GAME SHARED STYLES
     ============================================ */
  .game-panel {
    width: 100%;
    max-width: 560px;
    text-align: center;
  }
  .game-title {
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--blue);
    margin-bottom: 4px;
  }
  .game-name {
    font-size: clamp(1.2rem, 4vw, 1.6rem);
    color: var(--gold);
    margin-bottom: 8px;
    font-style: italic;
  }
  .game-instructions {
    font-size: 0.82rem;
    color: var(--dim);
    margin-bottom: 14px;
    line-height: 1.5;
  }
  .game-canvas-wrapper {
    position: relative;
    display: inline-block;
    border-radius: 12px;
    overflow: hidden;
    border: 2px solid rgba(0,191,255,0.4);
    box-shadow: 0 0 24px rgba(0,191,255,0.2);
  }
  canvas {
    display: block;
    background: var(--navy2);
  }
  .game-status {
    margin-top: 12px;
    font-size: 0.9rem;
    min-height: 1.4em;
    color: var(--gold);
    font-weight: bold;
  }
  .game-win-msg {
    font-size: clamp(0.9rem, 2.5vw, 1.1rem);
    color: #80ff80;
    font-style: italic;
    margin-top: 8px;
  }
  .game-btn {
    margin-top: 12px;
    padding: 10px 24px;
    border-radius: 24px;
    border: 2px solid var(--blue);
    background: rgba(5,10,26,0.9);
    color: var(--blue);
    font-size: 0.82rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
  }
  .game-btn:hover {
    background: var(--blue);
    color: var(--navy);
  }

  /* ============================================
     GAME 2 — HARMONICS
     ============================================ */
  .harmonics-grid {
    display: flex;
    gap: 14px;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 10px;
  }
  .harmonic-btn {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    border: 3px solid transparent;
    cursor: pointer;
    font-size: 1.5rem;
    transition: transform 0.1s, box-shadow 0.15s;
    outline: none;
    position: relative;
    overflow: hidden;
  }
  .harmonic-btn.lit {
    transform: scale(1.15);
    box-shadow: 0 0 28px 8px currentColor;
  }
  .harmonic-btn:disabled { cursor: default; }
  .hbtn-blue  { background: #1a5aff; color: #1a5aff; border-color: #4488ff; }
  .hbtn-gold  { background: #ffd700; color: #ffd700; border-color: #ffe066; }
  .hbtn-red   { background: #ff3a3a; color: #ff3a3a; border-color: #ff7777; }
  .hbtn-green { background: #00cc66; color: #00cc66; border-color: #00ff88; }

  /* ============================================
     GAME 3 — LIGHTS OUT
     ============================================ */
  .lights-grid {
    display: grid;
    grid-template-columns: repeat(3, 80px);
    grid-template-rows: repeat(3, 80px);
    gap: 8px;
    margin: 12px auto;
    justify-content: center;
  }
  .light-tile {
    width: 80px;
    height: 80px;
    border-radius: 12px;
    border: 2px solid rgba(0,191,255,0.3);
    background: var(--navy3);
    cursor: pointer;
    transition: background 0.2s, box-shadow 0.2s;
  }
  .light-tile.on {
    background: radial-gradient(circle, #00eeff 0%, #0077cc 100%);
    box-shadow: 0 0 20px rgba(0,238,255,0.7);
    border-color: #00eeff;
  }

  /* ============================================
     GAME 4 — MAZE
     ============================================ */
  #maze-canvas { cursor: crosshair; touch-action: none; }

  /* ============================================
     ENDING PANEL
     ============================================ */
  .ending-panel {
    text-align: center;
    width: 100%;
    max-width: 580px;
  }
  .ending-panel img {
    width: 100%;
    max-height: 45vh;
    object-fit: cover;
    border-radius: 16px;
    border: 3px solid var(--gold);
    box-shadow: var(--shadow);
    margin-bottom: 16px;
  }
  .ending-title {
    font-size: clamp(1.2rem, 4vw, 1.8rem);
    color: var(--gold);
    text-shadow: 0 0 16px rgba(255,215,0,0.5);
    margin-bottom: 6px;
  }
  .ending-subtitle {
    font-size: 1rem;
    color: var(--blue);
    font-style: italic;
    margin-bottom: 18px;
  }
  .credits {
    font-size: 0.78rem;
    color: var(--dim);
    line-height: 2;
    letter-spacing: 0.05em;
  }
  .credits span {
    color: var(--text);
  }
  .restart-btn {
    margin-top: 20px;
    padding: 12px 32px;
    border-radius: 30px;
    border: 2px solid var(--gold);
    background: rgba(5,10,26,0.9);
    color: var(--gold);
    font-size: 0.85rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
  }
  .restart-btn:hover {
    background: var(--gold);
    color: var(--navy);
  }

  @media (max-width: 480px) {
    .harmonic-btn { width: 64px; height: 64px; }
    .lights-grid { grid-template-columns: repeat(3, 72px); grid-template-rows: repeat(3, 72px); }
    .light-tile { width: 72px; height: 72px; }
    canvas { max-width: 100%; }
  }
</style>
</head>
<body>

<div id="progress-bar-container">
  <div id="progress-bar" style="width:0%"></div>
</div>
<div id="chapter-label">Chapter 1 — The Mission</div>

<div id="scene">
  <!-- All panels injected by JS -->
</div>

<button id="nav-prev" onclick="navigate(-1)">← Prev</button>
<button id="nav-next" onclick="navigate(1)">Next →</button>

<script>
// ============================================================
//  PANEL DEFINITIONS
// ============================================================
const PANELS = [

  // 0 — TITLE
  {
    chapter: 'Prologue',
    type: 'title',
    render() {
      return `
        <div class="panel panel-title" id="p0">
          <div class="ship-name">★ A Leemur & Vance Production ★</div>
          <h1>CODY<br>CAPTAIN OF THE<br>DISCOVERY</h1>
          <div class="subtitle">An illustrated space odyssey</div>
          <img class="comic-photo" src="cody2.jpg" alt="Captain Cody">
        </div>`;
    }
  },

  // 1 — TEETH
  {
    chapter: 'Chapter 1 — The Mission',
    type: 'photo',
    render() {
      return `
        <div class="panel" id="p1">
          <img class="comic-photo" src="cody-teeth.jpg" alt="The Teeth">
          <div class="caption">"No one questioned the Captain's authority. Not after they saw <strong>the teeth</strong>."</div>
        </div>`;
    }
  },

  // 2 — BOB CAR
  {
    chapter: 'Chapter 1 — The Mission',
    type: 'photo',
    render() {
      return `
        <div class="panel" id="p2">
          <img class="comic-photo" src="cody-bob-car.jpg" alt="Chief Scientist Bob">
          <div class="caption">"Chief Scientist <strong>Bob</strong> ran the numbers. He was rarely wrong. Except about parking."</div>
        </div>`;
    }
  },

  // 3 — LEORA SIGNAL
  {
    chapter: 'Chapter 1 — The Mission',
    type: 'text',
    render() {
      return `
        <div class="panel panel-text-only" id="p3">
          <div class="chapter-tag">Chapter 1 — The Mission</div>
          <div class="panel-prose">Leora detected a signal from the Outer Bone Nebula.<br><br>Not noise.<br><br><strong style="color:var(--gold)">Music.</strong></div>
        </div>`;
    }
  },

  // 4 — CODY SETS COURSE
  {
    chapter: 'Chapter 1 — The Mission',
    type: 'text',
    render() {
      return `
        <div class="panel panel-text-only" id="p4">
          <div class="chapter-tag">Chapter 1 — The Mission</div>
          <div class="panel-prose">Captain Cody set course.<br><br>His ears flopped with <strong style="color:var(--blue)">determination</strong>.</div>
        </div>`;
    }
  },

  // 5 — MINI GAME 1
  {
    chapter: 'Mission: Navigate to the Signal',
    type: 'game',
    gameId: 1,
    render() {
      return `
        <div class="panel game-panel" id="p5">
          <div class="game-title">★ Mini Game 1 ★</div>
          <div class="game-name">"Navigate to the Signal"</div>
          <div class="game-instructions">Move Cody's ship left/right (← → or A/D or tap sides).<br>Avoid asteroids. Reach the pulsing star. 15 seconds!</div>
          <div class="game-canvas-wrapper">
            <canvas id="g1-canvas" width="480" height="320"></canvas>
          </div>
          <div class="game-status" id="g1-status">⏱ 15</div>
          <div class="game-win-msg" id="g1-winmsg" style="display:none">"Signal acquired! The Glimmerfins await."</div>
          <button class="game-btn" id="g1-restart" onclick="initGame1()" style="display:none">Try Again</button>
        </div>`;
    }
  },

  // 6 — GLIMMERFINS
  {
    chapter: 'Chapter 2 — First Contact',
    type: 'text',
    render() {
      return `
        <div class="panel panel-text-only" id="p6">
          <div class="chapter-tag">Chapter 2 — First Contact</div>
          <div class="panel-prose">The <strong style="color:var(--blue)">Glimmerfins</strong>.<br><br>Crystalline beings made of refracted light.</div>
        </div>`;
    }
  },

  // 7 — TERRIFIED
  {
    chapter: 'Chapter 2 — First Contact',
    type: 'text',
    render() {
      return `
        <div class="panel panel-text-only" id="p7">
          <div class="chapter-tag">Chapter 2 — First Contact</div>
          <div class="panel-prose">They were beautiful.<br><br>And <strong style="color:var(--gold)">terrified</strong>.<br><br>Something was hunting them.</div>
        </div>`;
    }
  },

  // 8 — LEORA TRANSLATES
  {
    chapter: 'Chapter 2 — First Contact',
    type: 'text',
    render() {
      return `
        <div class="panel panel-text-only" id="p8">
          <div class="chapter-tag">Chapter 2 — First Contact</div>
          <div class="panel-prose">Only <strong style="color:var(--gold)">Leora</strong> could translate their harmonic language.</div>
        </div>`;
    }
  },

  // 9 — MINI GAME 2
  {
    chapter: 'Mission: Match the Harmonics',
    type: 'game',
    gameId: 2,
    render() {
      return `
        <div class="panel game-panel" id="p9">
          <div class="game-title">★ Mini Game 2 ★</div>
          <div class="game-name">"Match the Harmonics"</div>
          <div class="game-instructions">Watch the pattern flash. Then repeat it in order. 3 rounds!</div>
          <div id="g2-round-display" style="color:var(--dim);font-size:0.8rem;margin-bottom:4px"></div>
          <div class="harmonics-grid">
            <button class="harmonic-btn hbtn-blue"  id="hb-blue"  onclick="harmonicPress('blue')"  disabled>🔵</button>
            <button class="harmonic-btn hbtn-gold"  id="hb-gold"  onclick="harmonicPress('gold')"  disabled>⭐</button>
            <button class="harmonic-btn hbtn-red"   id="hb-red"   onclick="harmonicPress('red')"   disabled>🔴</button>
            <button class="harmonic-btn hbtn-green" id="hb-green" onclick="harmonicPress('green')" disabled>💚</button>
          </div>
          <div class="game-status" id="g2-status">Get ready…</div>
          <div class="game-win-msg" id="g2-winmsg" style="display:none">"The Glimmerfins understood. A bridge was built."</div>
          <button class="game-btn" id="g2-restart" onclick="initGame2()" style="display:none">Try Again</button>
        </div>`;
    }
  },

  // 10 — VOID HUNTERS ARRIVE
  {
    chapter: 'Chapter 3 — The Void Hunters',
    type: 'text',
    render() {
      return `
        <div class="panel panel-text-only" id="p10">
          <div class="chapter-tag">Chapter 3 — The Void Hunters</div>
          <div class="panel-prose">They came without warning.<br><br>The lights went out<br>one by one.</div>
        </div>`;
    }
  },

  // 11 — CODY BED
  {
    chapter: 'Chapter 3 — The Void Hunters',
    type: 'photo',
    render() {
      return `
        <div class="panel" id="p11">
          <img class="comic-photo" src="cody-bed.jpg" alt="Captain lounging">
          <div class="caption">"The Captain did not panic. He had survived worse. He had survived <strong>baths</strong>."</div>
        </div>`;
    }
  },

  // 12 — VANCE ASLEEP
  {
    chapter: 'Chapter 3 — The Void Hunters',
    type: 'text',
    render() {
      return `
        <div class="panel panel-text-only" id="p12">
          <div class="chapter-tag">Chapter 3 — The Void Hunters</div>
          <div class="panel-prose"><strong style="color:var(--blue)">Vance</strong> was already asleep at his engineering station.<br><br>Classic Vance.</div>
        </div>`;
    }
  },

  // 13 — SUE OPENS CHANNEL
  {
    chapter: 'Chapter 3 — The Void Hunters',
    type: 'text',
    render() {
      return `
        <div class="panel panel-text-only" id="p13">
          <div class="chapter-tag">Chapter 3 — The Void Hunters</div>
          <div class="panel-prose"><strong style="color:var(--gold)">Sue</strong> opened a channel to the darkness.<br><br>"Wait," she said. "I think they're just…<br><strong style="color:var(--blue)">lost</strong>."</div>
        </div>`;
    }
  },

  // 14 — MINI GAME 3
  {
    chapter: 'Mission: Restore the Grid',
    type: 'game',
    gameId: 3,
    render() {
      return `
        <div class="panel game-panel" id="p14">
          <div class="game-title">★ Mini Game 3 ★</div>
          <div class="game-name">"Restore the Grid"</div>
          <div class="game-instructions">Click a tile to toggle it and its neighbors.<br>Light all 9 tiles to restore power!</div>
          <div class="lights-grid" id="lights-grid">
            ${Array.from({length:9},(_,i)=>`<div class="light-tile" id="lt${i}" onclick="lightToggle(${i})"></div>`).join('')}
          </div>
          <div class="game-status" id="g3-status">Tiles off: 9</div>
          <div class="game-win-msg" id="g3-winmsg" style="display:none">"Power restored! The ship hums back to life."</div>
          <button class="game-btn" id="g3-restart" onclick="initGame3()" style="display:none">Try Again</button>
        </div>`;
    }
  },

  // 15 — SUE THERAPY
  {
    chapter: 'Chapter 4 — The Therapy Session',
    type: 'text',
    render() {
      return `
        <div class="panel panel-text-only" id="p15">
          <div class="chapter-tag">Chapter 4 — The Therapy Session</div>
          <div class="panel-prose"><strong style="color:var(--gold)">Sue</strong> to the Void Hunters:<br><br>"Tell me about your home."</div>
        </div>`;
    }
  },

  // 16 — FORGOTTEN
  {
    chapter: 'Chapter 4 — The Therapy Session',
    type: 'text',
    render() {
      return `
        <div class="panel panel-text-only" id="p16">
          <div class="chapter-tag">Chapter 4 — The Therapy Session</div>
          <div class="panel-prose">They had been wandering so long<br>they'd <strong style="color:var(--blue)">forgotten</strong><br>what they were looking for.</div>
        </div>`;
    }
  },

  // 17 — CODY STANDING
  {
    chapter: 'Chapter 4 — The Therapy Session',
    type: 'photo',
    render() {
      return `
        <div class="panel" id="p17">
          <img class="comic-photo" src="cody-standing.jpg" alt="Captain Cody rises">
          <div class="caption">"Captain Cody rose. This was the moment. He knew what <strong>lost</strong> felt like. Every time Bob left for work."</div>
        </div>`;
    }
  },

  // 18 — BARK
  {
    chapter: 'Chapter 4 — The Therapy Session',
    type: 'text',
    render() {

// ============================================================
//  NAVIGATION STATE
// ============================================================
const TOTAL = PANELS.length;
let current = parseInt(localStorage.getItem('cody-progress') || '0', 10);
if (current >= TOTAL) current = 0;

// Game "completed" flags — once won, panel auto-unlocks Next
const gameWon = { 1: false, 2: false, 3: false, 4: false, 5: false };

function saveProgress() {
  localStorage.setItem('cody-progress', current);
}

function updateProgress() {
  const pct = (current / (TOTAL - 1)) * 100;
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('chapter-label').textContent = PANELS[current].chapter;
  document.getElementById('nav-prev').disabled = (current === 0);
  // Next always enabled (games can be skipped after attempt)
  document.getElementById('nav-next').disabled = false;
}

function renderAll() {
  const scene = document.getElementById('scene');
  scene.innerHTML = PANELS.map(p => p.render()).join('');
}

function showPanel(idx) {
  document.querySelectorAll('.panel').forEach(el => el.classList.remove('active'));
  const el = document.getElementById('p' + idx);
  if (el) el.classList.add('active');
  updateProgress();
  // Init games when their panel becomes active
  const panel = PANELS[idx];
  if (panel.type === 'game') {
    const gid = panel.gameId;
    if (!gameWon[gid]) {
      if (gid === 1) initGame1();
      else if (gid === 2) initGame2();
      else if (gid === 3) initGame3();
      else if (gid === 4) initGame4();
      else if (gid === 5) initGame5();
    }
  }
}

function navigate(dir) {
  const next = current + dir;
  if (next < 0 || next >= TOTAL) return;
  // Stop any running games
  stopAllGames();
  current = next;
  saveProgress();
  showPanel(current);
}

function restartStory() {
  stopAllGames();
  current = 0;
  Object.keys(gameWon).forEach(k => gameWon[k] = false);
  saveProgress();
  showPanel(0);
}

// ============================================================
//  GAME 1 — Navigate to the Signal
// ============================================================
let g1 = { raf: null, timer: null, running: false };

function initGame1() {
  stopGame(g1);
  const canvas = document.getElementById('g1-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;

  const state = {
    ship: { x: W/2, y: H - 50, w: 24, h: 28, speed: 5 },
    star: { x: W/2, y: 60, r: 14, pulse: 0 },
    asteroids: Array.from({length:5}, (_, i) => ({
      x: 40 + (i * (W-80)/4) + Math.random()*30 - 15,
      y: -30 - i * 60,
      r: 16 + Math.random()*10,
      speed: 1.2 + Math.random()*1.2
    })),
    keys: {},
    time: 15,
    won: false,
    lost: false
  };

  const statusEl = document.getElementById('g1-status');
  const winEl = document.getElementById('g1-winmsg');
  const restartEl = document.getElementById('g1-restart');
  winEl.style.display = 'none';
  restartEl.style.display = 'none';
  statusEl.textContent = '⏱ 15';
  statusEl.style.color = 'var(--gold)';

  // Keyboard
  const onKey = e => {
    if (['ArrowLeft','ArrowRight','a','d'].includes(e.key)) {
      state.keys[e.key] = (e.type === 'keydown');
      e.preventDefault();
    }
  };
  document.addEventListener('keydown', onKey);
  document.addEventListener('keyup', onKey);

  // Touch: tap left/right half
  const onTouch = e => {
    const rect = canvas.getBoundingClientRect();
    const tx = e.touches[0].clientX - rect.left;
    if (tx < W/2) { state.keys['ArrowLeft'] = true; state.keys['ArrowRight'] = false; }
    else { state.keys['ArrowRight'] = true; state.keys['ArrowLeft'] = false; }
  };
  const onTouchEnd = () => { state.keys['ArrowLeft'] = false; state.keys['ArrowRight'] = false; };
  canvas.addEventListener('touchstart', onTouch, {passive:true});
  canvas.addEventListener('touchend', onTouchEnd);

  // Timer
  g1.timer = setInterval(() => {
    if (state.won || state.lost) return;
    state.time--;
    statusEl.textContent = '⏱ ' + state.time;
    if (state.time <= 5) statusEl.style.color = '#ff5555';
    if (state.time <= 0) {
      state.lost = true;
      statusEl.textContent = '💥 Time\'s up! Try again.';
      restartEl.style.display = '';
      clearInterval(g1.timer);
    }
  }, 1000);

  function loop() {
    if (state.won || state.lost) return;
    ctx.clearRect(0, 0, W, H);

    // BG
    ctx.fillStyle = '#050a1a';
    ctx.fillRect(0, 0, W, H);
    // Stars
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    for (let i=0; i<30; i++) {
      ctx.beginPath();
      ctx.arc((i*73+11)%W, (i*47+7)%H, 0.8, 0, Math.PI*2);
      ctx.fill();
    }

    // Ship
    const s = state.ship;
    if (state.keys['ArrowLeft'] || state.keys['a']) s.x = Math.max(s.w, s.x - s.speed);
    if (state.keys['ArrowRight'] || state.keys['d']) s.x = Math.min(W - s.w, s.x + s.speed);

    ctx.save();
    ctx.translate(s.x, s.y);
    ctx.fillStyle = '#00bfff';
    ctx.beginPath();
    ctx.moveTo(0, -s.h);
    ctx.lineTo(-s.w, s.h/2);
    ctx.lineTo(s.w, s.h/2);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#050a1a';
    ctx.font = '18px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('🐕', 0, 2);
    ctx.restore();

    // Star
    state.star.pulse += 0.08;
    const glow = Math.abs(Math.sin(state.star.pulse)) * 10 + 12;
    const grad = ctx.createRadialGradient(state.star.x, state.star.y, 2, state.star.x, state.star.y, glow);
    grad.addColorStop(0, '#ffd700');
    grad.addColorStop(1, 'transparent');
    ctx.beginPath();
    ctx.arc(state.star.x, state.star.y, glow, 0, Math.PI*2);
    ctx.fillStyle = grad;
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(state.star.x, state.star.y, 6, 0, Math.PI*2);
    ctx.fill();

    // Asteroids
    for (const a of state.asteroids) {
      a.y += a.speed;
      if (a.y > H + a.r) a.y = -a.r;
      ctx.beginPath();
      ctx.arc(a.x, a.y, a.r, 0, Math.PI*2);
      ctx.fillStyle = '#445566';
      ctx.fill();
      ctx.strokeStyle = '#6688aa';
      ctx.lineWidth = 1.5;
      ctx.stroke();
      // Collision with ship
      const dx = s.x - a.x, dy = s.y - a.y;
      if (Math.sqrt(dx*dx+dy*dy) < a.r + 14) {
        state.lost = true;
        statusEl.textContent = '💥 Hit! Try again.';
        restartEl.style.display = '';
        clearInterval(g1.timer);
        document.removeEventListener('keydown', onKey);
        document.removeEventListener('keyup', onKey);
        return;
      }
    }

    // Reach star?
    const dx = s.x - state.star.x, dy = s.y - state.star.y;
    if (Math.sqrt(dx*dx+dy*dy) < state.star.r + 20) {
      state.won = true;
      gameWon[1] = true;
      statusEl.textContent = '✨ Signal acquired!';
      statusEl.style.color = '#80ff80';
      winEl.style.display = '';
      clearInterval(g1.timer);
      document.removeEventListener('keydown', onKey);
      document.removeEventListener('keyup', onKey);
      return;
    }

    g1.raf = requestAnimationFrame(loop);
  }

  g1.raf = requestAnimationFrame(loop);
  g1.cleanup = () => {
    document.removeEventListener('keydown', onKey);
    document.removeEventListener('keyup', onKey);
    canvas.removeEventListener('touchstart', onTouch);
    canvas.removeEventListener('touchend', onTouchEnd);
  };
  g1.running = true;
}

// ============================================================
//  GAME 2 — Match the Harmonics
// ============================================================
let g2 = { timer: null, running: false };
let g2State = {};

function initGame2() {
  stopGame(g2);
  const statusEl = document.getElementById('g2-status');
  const winEl = document.getElementById('g2-winmsg');
  const restartEl = document.getElementById('g2-restart');
  const roundEl = document.getElementById('g2-round-display');
  if (!statusEl) return;
  winEl.style.display = 'none';
  restartEl.style.display = 'none';

  const colors = ['blue','gold','red','green'];
  g2State = {
    round: 1,
    maxRounds: 3,
    sequence: [],
    playerSeq: [],
    showing: false,
    accepting: false,
    won: false,
    lost: false
  };

  function generateSeq(round) {
    const len = 2 + round;
    const seq = [];
    for (let i=0; i<len; i++) seq.push(colors[Math.floor(Math.random()*4)]);
    return seq;
  }

  function setButtons(enabled) {
    colors.forEach(c => {
      const btn = document.getElementById('hb-' + c);
      if (btn) btn.disabled = !enabled;
    });
  }

  function flashBtn(color, ms=400) {
    return new Promise(res => {
      const btn = document.getElementById('hb-' + color);
      if (!btn) { res(); return; }
      btn.classList.add('lit');
      setTimeout(() => { btn.classList.remove('lit'); res(); }, ms);
    });
  }

  async function showSequence(seq) {
    g2State.showing = true;
    setButtons(false);
    statusEl.textContent = 'Watch…';
    await sleep(600);
    for (const c of seq) {
      await flashBtn(c, 450);
      await sleep(200);
    }
    g2State.showing = false;
    g2State.accepting = true;
    statusEl.textContent = 'Your turn!';
    setButtons(true);
  }

  function startRound(round) {
    g2State.round = round;
    g2State.playerSeq = [];
    g2State.sequence = generateSeq(round);
    roundEl.textContent = `Round ${round} of ${g2State.maxRounds}`;
    showSequence(g2State.sequence);
  }

  window.harmonicPress = function(color) {
    if (!g2State.accepting || g2State.won || g2State.lost) return;
    g2State.playerSeq.push(color);
    flashBtn(color, 200);
    const idx = g2State.playerSeq.length - 1;
    if (g2State.playerSeq[idx] !== g2State.sequence[idx]) {
      // Wrong
      g2State.accepting = false;
      g2State.lost = true;
      setButtons(false);
      statusEl.textContent = '❌ Wrong! Try again.';
      restartEl.style.display = '';
      return;
    }
    if (g2State.playerSeq.length === g2State.sequence.length) {
      // Round complete
      g2State.accepting = false;
      setButtons(false);
      if (g2State.round >= g2State.maxRounds) {
        // WIN
        g2State.won = true;
        gameWon[2] = true;
        statusEl.textContent = '✨ Perfect harmony!';
        statusEl.style.color = '#80ff80';
        winEl.style.display = '';
      } else {
        statusEl.textContent = '✅ Round complete!';
        g2.timer = setTimeout(() => startRound(g2State.round + 1), 800);
      }
    }
  };

  startRound(1);
  g2.running = true;
}

// ============================================================
//  GAME 3 — Lights Out
// ============================================================
let g3State = [];

function initGame3() {
  const statusEl = document.getElementById('g3-status');
  const winEl = document.getElementById('g3-winmsg');
  const restartEl = document.getElementById('g3-restart');
  if (!statusEl) return;
  winEl.style.display = 'none';
  restartEl.style.display = 'none';

  // Guaranteed solvable: start all on, apply random moves
  g3State = Array(9).fill(true);
  const applyToggle = i => {
    const neighbors = [0,-1,1,-3,3,-4,4,-2,2].filter(d => {
      const ni = i+d;
      if (ni<0||ni>8) return false;
      if (i%3===0 && (d===-1||d===-4||d===2)) return false;
      if (i%3===2 && (d===1||d===4||d===-2)) return false;
      return true;
    });
    [i, ...neighbors].forEach(ni => {
      if (ni>=0&&ni<9) g3State[ni] = !g3State[ni];
    });
  };
  // 6–10 random valid moves to scramble
  for (let k=0; k<7+Math.floor(Math.random()*4); k++) applyToggle(Math.floor(Math.random()*9));

  renderLights();
  updateG3Status();
}

function neighbors3(i) {
  const row = Math.floor(i/3), col = i%3;
  const result = [i];
  if (row > 0) result.push(i-3);
  if (row < 2) result.push(i+3);
  if (col > 0) result.push(i-1);
  if (col < 2) result.push(i+1);
  return result;
}

window.lightToggle = function(i) {
  const winEl = document.getElementById('g3-winmsg');
  if (!winEl || gameWon[3]) return;
  neighbors3(i).forEach(n => { g3State[n] = !g3State[n]; });
  renderLights();
  updateG3Status();
};

function renderLights() {
  for (let i=0; i<9; i++) {
    const el = document.getElementById('lt' + i);
    if (el) el.classList.toggle('on', g3State[i]);
  }
}

function updateG3Status() {
  const statusEl = document.getElementById('g3-status');
  const winEl = document.getElementById('g3-winmsg');
  if (!statusEl) return;
  const offCount = g3State.filter(v => !v).length;
  if (offCount === 0) {
    statusEl.textContent = '✨ All lit!';
    statusEl.style.color = '#80ff80';
    gameWon[3] = true;
    if (winEl) winEl.style.display = '';
  } else {
    statusEl.textContent = `Tiles off: ${offCount}`;
  }
}

// ============================================================
//  GAME 4 — Maze
// ============================================================
let g4 = { raf: null, timer: null, running: false };

function initGame4() {
  stopGame(g4);
  const canvas = document.getElementById('maze-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;

  const statusEl = document.getElementById('g4-status');
  const winEl = document.getElementById('g4-winmsg');
  const restartEl = document.getElementById('g4-restart');
  if (!statusEl) return;
  winEl.style.display = 'none';
  restartEl.style.display = 'none';
  statusEl.textContent = '⏱ 15';
  statusEl.style.color = 'var(--gold)';

  // Simple predefined maze walls (horizontal segments)
  // Cell size
  const CS = 48;
  const COLS = Math.floor(W/CS);
  const ROWS = Math.floor(H/CS);

  // Walls defined as {x1,y1,x2,y2} in pixel coords
  const walls = [
    // Outer border
    {x1:0,y1:0,x2:W,y2:0},
    {x1:0,y1:H,x2:W,y2:H},
    {x1:0,y1:0,x2:0,y2:H},
    {x1:W,y1:0,x2:W,y2:H},
    // Internal walls — create a winding path
    {x1:CS,y1:0,x2:CS,y2:CS*3},
    {x1:CS*2,y1:CS,x2:CS*2,y2:CS*4},
    {x1:CS*3,y1:0,x2:CS*3,y2:CS*2},
    {x1:CS*3,y1:CS*3,x2:CS*3,y2:CS*5},
    {x1:CS*4,y1:CS,x2:CS*4,y2:CS*3},
    {x1:CS*5,y1:0,x2:CS*5,y2:CS*2},
    {x1:CS*5,y1:CS*3,x2:CS*5,y2:H},
    {x1:CS*6,y1:CS,x2:CS*6,y2:CS*4},
    {x1:CS*7,y1:0,x2:CS*7,y2:CS*3},
    {x1:CS*7,y1:CS*4,x2:CS*7,y2:H},
    {x1:CS*8,y1:CS,x2:CS*8,y2:CS*4},
    // Horizontal walls
    {x1:CS,y1:CS*2,x2:CS*3,y2:CS*2},
    {x1:CS*4,y1:CS*3,x2:CS*6,y2:CS*3},
    {x1:CS*2,y1:CS*4,x2:CS*4,y2:CS*4},
    {x1:CS*6,y1:CS*4,x2:CS*8,y2:CS*4},
  ];

  const dotR = 10;
  const dot = { x: 24, y: H/2, dragging: false };
  const goal = { x: W - 24, y: H/2 };
  let time = 15, won = false, lost = false;

  function segmentsIntersect(ax1,ay1,ax2,ay2, bx1,by1,bx2,by2) {
    const dax=ax2-ax1, day=ay2-ay1, dbx=bx2-bx1, dby=by2-by1;
    const denom = dax*dby - day*dbx;
    if (denom===0) return false;
    const t = ((bx1-ax1)*dby - (by1-ay1)*dbx)/denom;
    const u = ((bx1-ax1)*day - (by1-ay1)*dax)/denom;
    return t>=0&&t<=1&&u>=0&&u<=1;
  }

  function collidesWall(nx, ny) {
    // Check if circle at nx,ny overlaps any wall
    for (const w of walls) {
      // Distance from center to line segment
      const dx = w.x2-w.x1, dy = w.y2-w.y1;
      const len2 = dx*dx+dy*dy;
      if (len2===0) continue;
      let t = ((nx-w.x1)*dx+(ny-w.y1)*dy)/len2;
      t = Math.max(0, Math.min(1, t));
      const cx = w.x1+t*dx, cy = w.y1+t*dy;
      const dist2 = (nx-cx)**2+(ny-cy)**2;
      if (dist2 < (dotR+2)**2) return true;
    }
    return false;
  }

  const getPos = (e, canvas) => {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    if (e.touches) {
      return {
        x: (e.touches[0].clientX - rect.left) * scaleX,
        y: (e.touches[0].clientY - rect.top) * scaleY
      };
    }
    return {
      x: (e.clientX - rect.left) * scaleX,
      y: (e.clientY - rect.top) * scaleY
    };
  };

  const onDown = e => {
    const pos = getPos(e, canvas);
    if (Math.hypot(pos.x - dot.x, pos.y - dot.y) < dotR * 2) dot.dragging = true;
    e.preventDefault();
  };
  const onMove = e => {
    if (!dot.dragging || won || lost) return;
    const pos = getPos(e, canvas);
    if (!collidesWall(pos.x, pos.y)) {
      dot.x = pos.x;
      dot.y = pos.y;
    }
    e.preventDefault();
  };
  const onUp = () => { dot.dragging = false; };

  canvas.addEventListener('mousedown', onDown);
  canvas.addEventListener('mousemove', onMove);
  canvas.addEventListener('mouseup', onUp);
  canvas.addEventListener('touchstart', onDown, {passive:false});
  canvas.addEventListener('touchmove', onMove, {passive:false});
  canvas.addEventListener('touchend', onUp);

  g4.timer = setInterval(() => {
    if (won || lost) return;
    time--;
    statusEl.textContent = '⏱ ' + time;
    if (time <= 5) statusEl.style.color = '#ff5555';
    if (time <= 0) {
      lost = true;
      statusEl.textContent = '⏱ Time\'s up! Try again.';
      restartEl.style.display = '';
      clearInterval(g4.timer);
    }
  }, 1000);

  function draw() {
    if (won || lost) return;
    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = '#050a1a';
    ctx.fillRect(0, 0, W, H);

    // Goal star
    ctx.save();
    ctx.shadowBlur = 16;
    ctx.shadowColor = '#ffd700';
    ctx.fillStyle = '#ffd700';
    ctx.font = '24px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('⭐', goal.x, goal.y);
    ctx.restore();

    // Walls
    ctx.strokeStyle = '#1a4a7a';
    ctx.lineWidth = 4;
    ctx.lineCap = 'round';
    for (const w of walls) {
      ctx.beginPath();
      ctx.moveTo(w.x1, w.y1);
      ctx.lineTo(w.x2, w.y2);
      ctx.stroke();
    }

    // Dot
    const grad = ctx.createRadialGradient(dot.x, dot.y, 2, dot.x, dot.y, dotR);
    grad.addColorStop(0, '#ffffff');
    grad.addColorStop(1, '#00bfff');
    ctx.beginPath();
    ctx.arc(dot.x, dot.y, dotR, 0, Math.PI*2);
    ctx.fillStyle = grad;
    ctx.shadowBlur = 20;
    ctx.shadowColor = '#00bfff';
    ctx.fill();
    ctx.shadowBlur = 0;

    // Check goal
    if (Math.hypot(dot.x - goal.x, dot.y - goal.y) < 28) {
      won = true;
      gameWon[4] = true;
      statusEl.textContent = '✨ They\'re home!';
      statusEl.style.color = '#80ff80';
      winEl.style.display = '';
      clearInterval(g4.timer);
      return;
    }

    g4.raf = requestAnimationFrame(draw);
  }

  g4.raf = requestAnimationFrame(draw);
  g4.cleanup = () => {
    canvas.removeEventListener('mousedown', onDown);
    canvas.removeEventListener('mousemove', onMove);
    canvas.removeEventListener('mouseup', onUp);
    canvas.removeEventListener('touchstart', onDown);
    canvas.removeEventListener('touchmove', onMove);
    canvas.removeEventListener('touchend', onUp);
  };
  g4.running = true;
}

// ============================================================
//  GAME 5 — Catch the Biscuit
// ============================================================
let g5 = { raf: null, timer: null, running: false };

function initGame5() {
  stopGame(g5);
  const canvas = document.getElementById('g5-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;

  const statusEl = document.getElementById('g5-status');
  const winEl = document.getElementById('g5-winmsg');
  const restartEl = document.getElementById('g5-restart');
  if (!statusEl) return;
  winEl.style.display = 'none';
  restartEl.style.display = 'none';
  statusEl.textContent = '⏱ 20 | 🦴 0/5';
  statusEl.style.color = 'var(--gold)';

  const cody = { x: W/2, w: 50, h: 50, speed: 7 };
  const biscuits = [];
  const keys = {};
  let caught = 0, time = 20, won = false, lost = false;
  const TARGET = 5;

  function spawnBiscuit() {
    biscuits.push({
      x: 20 + Math.random() * (W - 40),
      y: -20,
      r: 12,
      speed: 2 + Math.random() * 2
    });
  }
  for (let i=0; i<3; i++) spawnBiscuit();

  const onKey = e => {
    if (['ArrowLeft','ArrowRight','a','d'].includes(e.key)) {
      keys[e.key] = (e.type === 'keydown');
      e.preventDefault();
    }
  };
  document.addEventListener('keydown', onKey);
  document.addEventListener('keyup', onKey);

  // Tap to move
  const onTap = e => {
    const rect = canvas.getBoundingClientRect();
    const tx = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
    const scaleX = W / rect.width;
    const tapX = tx * scaleX;
    cody.x += tapX < W/2 ? -40 : 40;
    cody.x = Math.max(cody.w/2, Math.min(W - cody.w/2, cody.x));
  };
  canvas.addEventListener('click', onTap);
  canvas.addEventListener('touchstart', onTap, {passive:true});

  g5.timer = setInterval(() => {
    if (won || lost) return;
    time--;
    statusEl.textContent = `⏱ ${time} | 🦴 ${caught}/${TARGET}`;
    if (time <= 5) statusEl.style.color = '#ff5555';
    if (time <= 0 && !won) {
      lost = true;
      statusEl.textContent = caught >= TARGET ? '✨ Done!' : `⏱ Time! Caught ${caught}/${TARGET}. Try again.`;
      restartEl.style.display = '';
      clearInterval(g5.timer);
    }
    if (Math.random() < 0.5) spawnBiscuit();
  }, 1000);

  function loop() {
    if (won || lost) return;
    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = '#050a1a';
    ctx.fillRect(0, 0, W, H);

    // Stars
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    for (let i=0; i<20; i++) {
      ctx.beginPath();
      ctx.arc((i*97+13)%W, (i*53+9)%H, 0.7, 0, Math.PI*2);
      ctx.fill();
    }

    // Move Cody
    if (keys['ArrowLeft'] || keys['a']) cody.x -= cody.speed;
    if (keys['ArrowRight'] || keys['d']) cody.x += cody.speed;
    cody.x = Math.max(cody.w/2, Math.min(W - cody.w/2, cody.x));

    // Draw Cody
    ctx.font = '36px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('🐕', cody.x, H - 30);

    // Catch zone
    ctx.strokeStyle = 'rgba(0,191,255,0.2)';
    ctx.lineWidth = 1;
    ctx.strokeRect(cody.x - cody.w, H - 55, cody.w*2, 50);

    // Biscuits
    for (let i = biscuits.length-1; i>=0; i--) {
      const b = biscuits[i];
      b.y += b.speed;

      // Draw biscuit
      ctx.font = '20px sans-serif';
      ctx.fillText('🦴', b.x, b.y);

      // Catch?
      if (b.y > H - 55 && b.y < H - 5 && Math.abs(b.x - cody.x) < cody.w + b.r) {
        biscuits.splice(i, 1);
        caught++;
        statusEl.textContent = `⏱ ${time} | 🦴 ${caught}/${TARGET}`;
        // Flash gold
        statusEl.style.color = '#ffd700';
        setTimeout(() => { statusEl.style.color = time<=5?'#ff5555':'var(--gold)'; }, 200);
        if (caught >= TARGET) {
          won = true;
          gameWon[5] = true;
          statusEl.textContent = '✨ 5 biscuits!';
          statusEl.style.color = '#80ff80';
          winEl.style.display = '';
          clearInterval(g5.timer);
          document.removeEventListener('keydown', onKey);
          document.removeEventListener('keyup', onKey);
          return;
        }
        continue;
      }

      // Missed (off bottom)
      if (b.y > H + 20) biscuits.splice(i, 1);
    }

    g5.raf = requestAnimationFrame(loop);
  }

  g5.raf = requestAnimationFrame(loop);
  g5.cleanup = () => {
    document.removeEventListener('keydown', onKey);
    document.removeEventListener('keyup', onKey);
    canvas.removeEventListener('click', onTap);
    canvas.removeEventListener('touchstart', onTap);
  };
  g5.running = true;
}

// ============================================================
//  UTILITIES
// ============================================================
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function stopGame(g) {
  if (g.raf) { cancelAnimationFrame(g.raf); g.raf = null; }
  if (g.timer) { clearInterval(g.timer); clearTimeout(g.timer); g.timer = null; }
  if (g.cleanup) { g.cleanup(); g.cleanup = null; }
  g.running = false;
}

function stopAllGames() {
  stopGame(g1);
  stopGame(g2);
  stopGame(g4);
  stopGame(g5);
}

// ============================================================
//  BOOT
// ============================================================
renderAll();
showPanel(current);

// Global keyboard: arrow keys for navigation when not in game
document.addEventListener('keydown', e => {
  const curPanel = PANELS[current];
  if (curPanel && curPanel.type === 'game') return; // let game handle it
  if (e.key === 'ArrowRight') navigate(1);
  if (e.key === 'ArrowLeft') navigate(-1);
});
</script>
